name: Rust Port CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    name: Rust ${{ matrix.toolchain }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        toolchain: [stable, 1.85.0]
        include:
          # Run the full locked test suite on Windows and macOS so OS-gated
          # tests (Windows fabricator target, macOS signing/fabricator) and
          # platform-specific code paths are actually exercised.
          - os: windows-latest
            toolchain: stable
          - os: macos-latest
            toolchain: stable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked --all-targets --all-features
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-targets --all-features
      - run: cargo test --locked --doc --all-features
      # Format, docs, and bench compilation are platform-independent; run them
      # once on Linux to keep the matrix fast while still enforcing the gate.
      - if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check
      - if: matrix.os == 'ubuntu-latest'
        run: cargo doc --locked --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings
      - if: matrix.os == 'ubuntu-latest'
        run: cargo bench --locked --bench packaging --no-run

  real-runtime-smoke:
    name: Real runtime smoke
    runs-on: ubuntu-latest
    env:
      PKG_RUST_REAL_CACHE: ${{ github.workspace }}/.pkg-rust-real-cache
      PKG_RUST_REAL_TARGET: node18-linux-x64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: .pkg-rust-real-cache
          key: pkg-fetch-v3.5-node18-linux-x64
      - run: cargo test --locked --test runtime_smoke -- --nocapture

  windows-issue-smoke:
    name: Windows issue smoke
    runs-on: windows-latest
    env:
      PKG_RUST_REAL_CACHE: ${{ github.workspace }}\.pkg-rust-real-cache
      PKG_RUST_REAL_TARGET: node18-win-x64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: .pkg-rust-real-cache
          key: pkg-fetch-v3.5-node18-win-x64
      - run: cargo test --locked --test runtime_smoke windows_issue_regression_fixtures_run_when_real_cache_is_configured -- --nocapture
